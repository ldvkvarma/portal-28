name: college_portal_complete
description: Complete College Automation Portal with Multi-Role Support
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  pdf: ^3.10.4
  printing: ^5.11.0
  flutter_local_notifications: ^18.0.0
  permission_handler: ^11.0.1
  connectivity_plus: ^5.0.1
  provider: ^6.1.1
  intl: ^0.18.1
  file_picker: ^8.0.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/resumes/
